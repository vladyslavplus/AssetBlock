name: Backend CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  actions: write
  pull-requests: write

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: zulu

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache SonarQube Cloud packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar-${{ hashFiles('asblock-backend/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-sonar-

      - name: Cache SonarQube Cloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v5
        with:
          path: .sonar/scanner
          key: ${{ runner.os }}-sonar-scanner-${{ hashFiles('.github/workflows/backend-ci.yml') }}
          restore-keys: ${{ runner.os }}-sonar-scanner-

      - name: Install SonarScanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        run: |
          mkdir -p .sonar/scanner
          dotnet tool install dotnet-sonarscanner --tool-path .sonar/scanner

      - uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('asblock-backend/**/*.csproj', 'asblock-backend/Directory.Packages.props', 'asblock-backend/NuGet.config', 'asblock-backend/**/packages.lock.json', 'asblock-backend/global.json') }}
          restore-keys: nuget-

      - name: Restore
        working-directory: asblock-backend
        run: dotnet restore

      - name: Sonar Begin
        working-directory: asblock-backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          "$GITHUB_WORKSPACE/.sonar/scanner/dotnet-sonarscanner" begin \
            /k:"vladyslavplus_AssetBlock" \
            /o:"vladyslavplus" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="${SONAR_TOKEN}" \
            /d:sonar.cs.vscoveragexml.reportsPaths="**/coverage.cobertura.xml"

      - name: Build
        working-directory: asblock-backend
        run: dotnet build --no-restore --configuration Release

      - name: Test & Collect Coverage
        working-directory: asblock-backend
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=normal" --collect:"XPlat Code Coverage"

      - name: Sonar End
        working-directory: asblock-backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          "$GITHUB_WORKSPACE/.sonar/scanner/dotnet-sonarscanner" end /d:sonar.token="${SONAR_TOKEN}"

      - name: Code Coverage Summary Report
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: "asblock-backend/**/coverage.cobertura.xml"
          badge: true
          format: markdown
          output: both

      - name: Add PR Coverage Comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          recreate: true
          path: code-coverage-results.md
